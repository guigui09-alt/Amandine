<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pour toi ❤️</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial;
color:white;
margin:0;
}

.container{
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:25px;
backdrop-filter:blur(10px);
max-width:90%;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin-top:20px;
}

#message{
display:none;
margin-top:25px;
font-size:20px;
line-height:1.6;
}

</style>

</head>

<body>

<div class="container">

<h1>J'ai quelque chose à te dire ❤️</h1>

<button id="btnOui">Oui ❤️</button>

<p id="message">
Depuis que je te connais, ma vie est devenue plus belle.  
Ton sourire illumine mes journées et chaque moment passé avec toi compte énormément pour moi.  
Je voulais simplement te dire que tu es quelqu’un de très spécial dans ma vie. ❤️
</p>

</div>

<script>

document.getElementById("btnOui").addEventListener("click", function(){

document.getElementById("message").style.display = "block"

})

</script>

</body>
</html>
