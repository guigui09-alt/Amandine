<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour toi ❤️</title>

<style>

body{
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
overflow:hidden;
background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ff9a9e,#fad0c4);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* LIQUID GLASS */

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
border-radius:30px;
border:1px solid rgba(255,255,255,0.3);
box-shadow:0 8px 40px rgba(0,0,0,0.2);
padding:40px;
max-width:420px;
color:white;
text-align:center;
}

/* bouton */

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:20px;
background:rgba(255,255,255,0.25);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:rgba(255,255,255,0.4);
}

#message{
margin-top:25px;
font-size:18px;
line-height:1.6;
white-space:pre-line;
}

/* coeur explosion */

.heart{
position:absolute;
font-size:20px;
pointer-events:none;
animation:explode 1s forwards;
}

@keyframes explode{
0%{
transform:scale(0);
opacity:1;
}
100%{
transform:translateY(-100px) scale(2);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>J'ai quelque chose à te dire ❤️</h1>

<button onclick="startLove()">Clique ici</button>

<div id="message"></div>

</div>

<script>

const text = `Depuis que je t’ai rencontré,
ma vie est devenue plus belle.

Chaque sourire de toi
illumine mes journées.

Je voulais simplement te dire
que tu es la personne la plus
importante pour moi.

Je t’aime de tout mon cœur ❤️`;

let i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

function explodeHearts(x,y){

for(let i=0;i<20;i++){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=x+"px";
heart.style.top=y+"px";

heart.style.transform=`translate(${Math.random()*200-100}px,${Math.random()*200-100}px)`;

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1000);

}

}

function startLove(){

typeWriter();

const rect = event.target.getBoundingClientRect();

explodeHearts(
rect.left + rect.width/2,
rect.top
);

}

</script>

</body>
</html>
