<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pour toi ❤️</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
color:white;
}

.container{
padding:20px;
max-width:90%;
}

h1{
font-size:32px;
}

h2{
font-size:26px;
margin-top:10px;
}

button{
margin:15px;
padding:15px 25px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
}

#oui{
background:#00ff95;
}

#non{
background:#ff3c3c;
position:absolute;
}

.heart{
position:fixed;
font-size:20px;
pointer-events:none;
}

</style>
</head>

<body>

<div class="container">

<h1>J'ai quelque chose à te dire ❤️</h1>

<h2>Amandine</h2>

<h2>Veux-tu sortir avec moi ?</h2>

<button id="oui" onclick="loveExplosion()">Oui ❤️</button>
<button id="non" onmouseover="fuir()">Non 😅</button>

</div>

<script>

function fuir(){

let bouton=document.getElementById("non");

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

bouton.style.left=x+"px";
bouton.style.top=y+"px";

}

function loveExplosion(){

for(let i=0;i<200;i++){

let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heart";

heart.style.left=window.innerWidth/2+"px";
heart.style.top=window.innerHeight/2+"px";

document.body.appendChild(heart);

let x=(Math.random()-0.5)*600;
let y=(Math.random()-0.5)*600;

heart.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{
duration:2000,
easing:"ease-out"
});

setTimeout(()=>{heart.remove()},2000)

}

alert("Tu viens de rendre quelqu'un très heureux ❤️");

}

</script>

</body>
</html>
