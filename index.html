<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pour toi ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
background: linear-gradient(-45deg,#ff758c,#ff7eb3,#ff6a88,#ff99ac);
background-size:400% 400%;
animation:gradient 12s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
backdrop-filter: blur(10px);
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
max-width:90%;
}

h1{
font-size:30px;
margin-bottom:10px;
}

h2{
font-size:24px;
margin-bottom:20px;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

button{
padding:15px 25px;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

#oui{
background:#00ff95;
color:black;
}

#oui:hover{
transform:scale(1.1);
}

#non{
background:#ff3c3c;
color:white;
position:absolute;
}

.heart{
position:fixed;
font-size:20px;
pointer-events:none;
}

</style>

</head>

<body>

<div class="container">

<h1>J'ai quelque chose à te dire ❤️</h1>

<h2>Amandine</h2>

<h2>Veux-tu sortir avec moi ?</h2>

<div class="buttons">
<button id="oui" onclick="explosion()">Oui ❤️</button>
<button id="non" onmouseover="fuir()">Non 😅</button>
</div>

</div>

<script>

function fuir(){

let bouton=document.getElementById("non");

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

bouton.style.left=x+"px";
bouton.style.top=y+"px";

}

function explosion(){

for(let i=0;i<200;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=window.innerWidth/2+"px";
heart.style.top=window.innerHeight/2+"px";

document.body.appendChild(heart);

let x=(Math.random()-0.5)*800;
let y=(Math.random()-0.5)*800;

heart.animate([
{transform:"translate(0,0) scale(1)",opacity:1},
{transform:`translate(${x}px,${y}px) scale(2)`,opacity:0}
],{
duration:2000,
easing:"ease-out"
});

setTimeout(()=>heart.remove(),2000)

}

alert("Tu viens de rendre quelqu’un très heureux ❤️")

}

</script>

</body>
</html>
